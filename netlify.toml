[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ============================================
# REDIRECTS 301 - Migration ancienne structure
# ============================================

# Root redirect avec détection langue
[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302
  force = false
  conditions = {Language = ["fr"]}

[[redirects]]
  from = "/"
  to = "/de/"
  status = 302
  force = false
  conditions = {Language = ["de"]}

# Fallback si pas de langue détectée
[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302

