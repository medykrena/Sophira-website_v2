# ============================================
# SECURITY HEADERS
# ============================================

# Headers de sécurité pour toutes les pages
[[headers]]
  for = "/*"
  [headers.values]
    # Sécurité de base
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # HSTS - Force HTTPS (1 an)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com;
      style-src 'self' 'unsafe-inline';
      font-src 'self';
      img-src 'self' data: https:;
      connect-src 'self' https://www.google-analytics.com;
      frame-src https://chatgpt.com;
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    '''
    
    # Permissions Policy
    Permissions-Policy = '''
      geolocation=(),
      microphone=(),
      camera=(),
      payment=(),
      usb=(),
      magnetometer=(),
      gyroscope=(),
      accelerometer=()
    '''

# ============================================
# CACHE HEADERS (Performance)
# ============================================

# Cache agressif pour les assets (1 an)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pas de cache pour les pages HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache pour les fonts (1 an + CORS)
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Cache pour les images (1 an)
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers spécifiques pour les favicons
[[headers]]
  for = "/assets/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

